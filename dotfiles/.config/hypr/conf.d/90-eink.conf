# Quickshell bar (no-duplicate)
# Note: platform tray menus require QApplication mode; running without daemonize avoids
# some cases where menus fail to display.
exec-once = quickshell -n

# GNOME/GTK4 (libadwaita) apps like Nautilus rely on the session environment and portals/gsettings
# for dark preference. Export desktop identifiers to the user session and set prefer-dark.
exec-once = sh -lc 'command -v dbus-update-activation-environment >/dev/null 2>&1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland XDG_SESSION_DESKTOP=Hyprland >/dev/null 2>&1 || true; command -v gsettings >/dev/null 2>&1 && gsettings set org.gnome.desktop.interface color-scheme prefer-dark >/dev/null 2>&1 || true'
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# xdg-desktop-portal: restart on login so GTK4/libadwaita apps reliably pick up appearance settings.
exec-once = sh -lc '\
  sleep 1; \
  systemctl --user restart xdg-desktop-portal 2>/dev/null && exit 0; \
  killall -e xdg-desktop-portal-hyprland 2>/dev/null || true; \
  killall -e xdg-desktop-portal-wlr 2>/dev/null || true; \
  killall xdg-desktop-portal 2>/dev/null || true; \
  backend=""; \
  for p in /usr/lib/xdg-desktop-portal-hyprland /usr/libexec/xdg-desktop-portal-hyprland /usr/lib/xdg-desktop-portal-wlr /usr/libexec/xdg-desktop-portal-wlr; do \
    [ -x "$p" ] && [ -s "$p" ] && backend="$p" && break; \
  done; \
  [ -n "$backend" ] && ("$backend" >/dev/null 2>&1 &) || true; \
  sleep 2; \
  (/usr/lib/xdg-desktop-portal >/dev/null 2>&1 &) || (/usr/libexec/xdg-desktop-portal >/dev/null 2>&1 &) || true \
'

# Restore wallpaper + regenerate theme on login (no-op if not set)
exec-once = ~/.local/bin/eink-wallpaper --restore

# Clipboard history (cliphist): run watchers via systemd user service for reliability across logins.
exec-once = sh -lc 'systemctl --user import-environment WAYLAND_DISPLAY XDG_RUNTIME_DIR >/dev/null 2>&1 || true; systemctl --user daemon-reload >/dev/null 2>&1 || true; systemctl --user restart cliphist-watch.service >/dev/null 2>&1 || true'

# Idle (dim/sleep)
exec-once = ~/.local/bin/eink-hypridle-apply --start

# Night light: handled by QuickSettings (wlsunset/gammastep fallback)

# Cursor
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# Qt/KDE apps (e.g. Dolphin): ensure they read KDE color-scheme settings under non-Plasma sessions.
env = QT_QPA_PLATFORMTHEME,kde

# --- Rice (look & feel) ---

# General layout
general {
    gaps_in = 6
    gaps_out = 10
    border_size = 2
    # Will be overridden dynamically by ~/.local/bin/eink-wallpaper to match the current accent.
    col.active_border = rgba(ffffffff) rgba(ffffff99) 45deg
    col.inactive_border = rgba(2b2a28cc)
    layout = dwindle
    allow_tearing = false
}

# Input
input {
    touchpad {
        natural_scroll = true
    }
}

# Rounded corners + blur + shadow
decoration {
    rounding = 16
    active_opacity = 0.92
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}

# Animations
animations {
    enabled = true

    bezier = easeOutCubic, 0.22, 1.0, 0.36, 1.0
    bezier = easeInOut, 0.65, 0.0, 0.35, 1.0

    animation = windows, 1, 4, easeOutCubic, slide
    animation = windowsOut, 1, 4, easeOutCubic, slide
    animation = layers, 1, 4, easeOutCubic, slide
    animation = layersOut, 1, 4, easeOutCubic, slide
    animation = border, 1, 6, easeOutCubic
    animation = fade, 1, 3, easeInOut
    animation = workspaces, 1, 4, easeOutCubic, slide
}

# Dwindle tweaks
dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.90
}

# Misc polish
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Layer rules (swaync panel)
# Only swaync should slide from the right; keep quickshell layers using their own top-slide.
layerrule = animation slide right, match:namespace swaync-control-center
layerrule = animation slide right, match:namespace swaync-notification-window

# Ensure quickshell layers don't inherit the global layer animation direction.
layerrule = animation slide top, match:namespace eink-.*

# Keybinds
bind = $mod, T, exec, kitty
bind = $mod, Q, killactive,
bind = $mod, E, exec, nautilus --new-window
bind = $mod, F, fullscreen,
bind = $mod, W, exec, sh -lc 'command -v brave >/dev/null 2>&1 && exec brave || exec brave-browser'
bind = $mod, L, exec, hyprlock

# Mouse move/resize handlers
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Keyboard resize mode: SUPER+R then arrow keys, exit with SUPER+R or Escape
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive, 12 0
binde = , left, resizeactive, -12 0
binde = , up, resizeactive, 0 -12
binde = , down, resizeactive, 0 12
bind = $mod, R, submap, reset
bind = , escape, submap, reset
submap = reset

# Mouse wheel workspace switching / moving windows
# Workspace groups of 5:
# - SUPER+1..5 jump within the current group (1-5, 6-10, 11-15, ...)
# - SUPER+scroll cycles within the current group (wraps at edges)
bind = $mod, 1, exec, ~/.local/bin/eink-ws go 1
bind = $mod, 2, exec, ~/.local/bin/eink-ws go 2
bind = $mod, 3, exec, ~/.local/bin/eink-ws go 3
bind = $mod, 4, exec, ~/.local/bin/eink-ws go 4
bind = $mod, 5, exec, ~/.local/bin/eink-ws go 5

# Scroll direction:
# - `mouse_down` (wheel down) -> next workspace (within group)
# - `mouse_up`   (wheel up)   -> previous workspace (within group)
bind = $mod, mouse_down, exec, ~/.local/bin/eink-ws prev
bind = $mod, mouse_up, exec, ~/.local/bin/eink-ws next

# Move focused window to adjacent workspace.
bind = $mod ALT, mouse_down, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent -1; hyprctl dispatch workspace -1'
bind = $mod ALT, mouse_up, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent +1; hyprctl dispatch workspace +1'
bind = $mod SHIFT, mouse_down, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent -1; hyprctl dispatch workspace -1'
bind = $mod SHIFT, mouse_up, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent +1; hyprctl dispatch workspace +1'

binds {
    # Prevent multi-trigger per wheel notch (fixes "flicker"/skipping on some mice).
    scroll_event_delay = 120
}

# Screenshots (Wayland)
# Selection: SUPER+SHIFT+S
bind = $mod SHIFT, S, exec, sh -lc 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/$(date +%Y-%m-%d_%H-%M-%S)_selection.png"; grim -g "$(slurp)" "$file" && wl-copy < "$file"'
# Fullscreen: PrintScreen
bind = , Print, exec, sh -lc 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/$(date +%Y-%m-%d_%H-%M-%S)_fullscreen.png"; grim "$file" && wl-copy < "$file"'

# Color picker: SUPER+SHIFT+C (copies hex and notifies via swaync/notify-send)
bind = $mod SHIFT, C, exec, sh -lc 'hex="$(hyprpicker -f hex 2>/dev/null)" || exit 0; [ -n "$hex" ] || exit 0; printf "%s" "$hex" | wl-copy; notify-send -a eink -u low "Copied hex" "Copied $hex to clipboard"'

# Notifications: open swaync control center
bind = $mod, N, exec, swaync-client -t -sw

# Launcher (rofi)
# True "Super tap" without breaking Super+shortcuts isn't reliably possible in Hyprland alone.
# Use an explicit chord.
bind = $mod, Space, exec, rofi -show drun

# Clipboard (cliphist + rofi): SUPER+V
bind = $mod, V, exec, sh -lc 'cliphist list | rofi -dmenu -i -p clipboard | cliphist decode | wl-copy'
# Clipboard delete (cliphist + rofi): SUPER+ALT+V
bind = $mod ALT, V, exec, sh -lc 'sel="$(cliphist list | rofi -dmenu -i -p \"delete\")" || exit 0; [ -n "$sel" ] || exit 0; id="${sel%%\\t*}"; [ -n "$id" ] || exit 0; cliphist delete <<<"$id" >/dev/null 2>&1 || cliphist delete "$id" >/dev/null 2>&1 || true'
